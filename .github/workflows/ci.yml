name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  docs_sync_guardrail:
    name: docs-sync-guardrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: CMD-DOCS-SYNC-GUARD
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          python3 scripts/check_docs_sync.py --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: CMD-CI-COMMAND-MAP-CHECK
        run: |
          python3 scripts/check_command_map.py

      - name: CMD-ARTIFACT-FEATURE-CONTRACT-CHECK
        run: |
          python3 scripts/check_artifact_feature_contract.py

  offline_quality_gates:
    name: offline-quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: docs_sync_guardrail
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt pytest

      - name: CMD-CLI-HELP
        run: |
          python3 -m src.interfaces.cli -h

      - name: CMD-TEST-MARKERS
        run: |
          python3 -m pytest --markers

      - name: CMD-TEST-UNIT
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          python3 -m pytest -m "not integration and not e2e and not live"

      - name: CMD-TEST-INTEGRATION
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          RUN_INTEGRATION: "1"
        run: |
          python3 -m pytest --run-integration -m integration

      - name: CMD-TEST-E2E
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          RUN_E2E: "1"
        run: |
          python3 -m pytest --run-e2e -m e2e
