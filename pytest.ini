[pytest]
# Harden test collection against third-party pytest plugin autoloads.
# The LangSmith plugin registers as `langsmith.pytest_plugin` (not just `langsmith`).
addopts = -p no:langsmith -p no:langsmith.pytest_plugin -p no:pytest_asyncio
testpaths = tests
norecursedirs = third_party venv .venv .pytest_cache

markers =
    integration: offline integration tests (DB/filesystem), no live network
    e2e: end-to-end tests (offline, minimal mocks)
    live: live network/browser tests (always opt-in)
    network: hits the network
    slow: long-running tests
