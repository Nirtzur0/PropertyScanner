  <g filter="url(#shadow)">
    <rect x="72" y="72" width="880" height="880" rx="228" fill="url(#surface)"/>
    <rect x="72" y="72" width="880" height="880" rx="228" fill="url(#topGlow)"/>
    <rect x="72" y="72" width="880" height="880" rx="228" fill="url(#bottomGlow)"/>
    <rect x="72" y="72" width="880" height="880" rx="228" fill="url(#depth)"/>
    <path d="M176 332C272 254 456 234 658 284C566 300 486 344 416 432C336 404 250 372 176 332Z" fill="url(#wave)"/>
    <rect x="73.5" y="73.5" width="877" height="877" rx="226.5" stroke="url(#rim)" stroke-width="3"/>
  </g>

  <g filter="url(#symbolShadow)">
    <path d="M388 304H492C610 304 684 376 684 486C684 596 610 668 492 668H336V356" stroke="#FFFFFF" stroke-width="76" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="498" y="420" width="30" height="176" rx="15" fill="url(#beam)"/>
