<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Property Scanner Logo</title>
  <desc id="desc">Colorful app icon with an abstract ribbon monogram and contemporary gradient field.</desc>
  <defs>
    <linearGradient id="surface" x1="118" y1="102" x2="900" y2="922" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C6FF6A"/>
      <stop offset="0.24" stop-color="#63F0D7"/>
      <stop offset="0.58" stop-color="#4E79FF"/>
      <stop offset="1" stop-color="#FF6FB5"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(244 214) rotate(42) scale(444 352)">
      <stop stop-color="#FFFFFF" stop-opacity="0.84"/>
      <stop offset="0.46" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(786 792) rotate(-137) scale(438 398)">
      <stop stop-color="#FFD59A" stop-opacity="0.82"/>
      <stop offset="0.48" stop-color="#FF946A" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FF946A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="depth" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(668 526) rotate(124) scale(554 610)">
      <stop stop-color="#557BFF" stop-opacity="0"/>
      <stop offset="0.58" stop-color="#2848BA" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#101D5A" stop-opacity="0.34"/>
    </radialGradient>
    <linearGradient id="wave" x1="192" y1="292" x2="756" y2="654" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.52" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rim" x1="148" y1="126" x2="844" y2="892" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.12"/>
