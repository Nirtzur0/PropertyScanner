    <filter id="shadow" x="22" y="28" width="980" height="980" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#081126" flood-opacity="0.22"/>
    </filter>
    <filter id="symbolShadow" x="208" y="222" width="554" height="534" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#14286E" flood-opacity="0.18"/>
    </filter>
