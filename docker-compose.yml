version: '3.8'

services:
  worker:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m src.interfaces.agent
    depends_on:
      - db

  dashboard:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run src/interfaces/dashboard/app.py --server.port=8505 --server.address=0.0.0.0
    ports:
      - "8505:8505"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner_password
      POSTGRES_DB: property_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
