version: "3.8"

services:
  api:
    build: .
    environment:
      PYTHONUNBUFFERED: "1"
      PROPERTY_SCANNER_DB_PATH: /app/data/listings.db
    ports:
      - "8001:8001"
    volumes:
      - property_scanner_data:/app/data
    command: python -m src.interfaces.cli api --host 0.0.0.0 --port 8001

volumes:
  property_scanner_data:
