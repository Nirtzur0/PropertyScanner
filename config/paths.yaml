# paths.yaml
# Centralized paths for the Property Scanner configuration (Hydra-managed).

paths:
  data_dir: ${oc.env:PROPERTY_SCANNER_DATA_DIR, ${hydra:runtime.cwd}/data}
  models_dir: ${oc.env:PROPERTY_SCANNER_MODELS_DIR, ${hydra:runtime.cwd}/models}
  config_dir: ${oc.env:PROPERTY_SCANNER_CONFIG_DIR, ${hydra:runtime.cwd}/config}
  snapshots_dir: ${oc.env:PROPERTY_SCANNER_SNAPSHOTS_DIR, ${paths.data_dir}/snapshots}

  default_db_path: ${oc.env:PROPERTY_SCANNER_DB_PATH, ${paths.data_dir}/listings.db}
  default_db_url: ${oc.env:PROPERTY_SCANNER_DB_URL, sqlite:///${paths.default_db_path}}

  vector_index_path: ${oc.env:PROPERTY_SCANNER_VECTOR_INDEX_PATH, ${paths.data_dir}/vector_index.faiss}
  vector_metadata_path: ${oc.env:PROPERTY_SCANNER_VECTOR_METADATA_PATH, ${paths.data_dir}/vector_metadata.json}
  lancedb_path: ${oc.env:PROPERTY_SCANNER_LANCEDB_PATH, ${paths.data_dir}/vector_index.lancedb}

  fusion_model_path: ${oc.env:PROPERTY_SCANNER_FUSION_MODEL_PATH, ${paths.models_dir}/fusion_model.pt}
  fusion_config_path: ${oc.env:PROPERTY_SCANNER_FUSION_CONFIG_PATH, ${paths.models_dir}/fusion_config.json}
  calibration_path: ${oc.env:PROPERTY_SCANNER_CALIBRATION_PATH, ${paths.models_dir}/calibration_registry.json}
  tft_model_path: ${oc.env:PROPERTY_SCANNER_TFT_MODEL_PATH, ${paths.models_dir}/tft_forecaster.pt}

  transactions_path: ${oc.env:PROPERTY_SCANNER_TRANSACTIONS_PATH, ${paths.data_dir}/transactions.csv}
