# llm.yaml
# LiteLLM configuration (ordered fallback list).

llm:
  provider: "chatmock"
  api_base: "http://127.0.0.1:8000/v1"
  api_key_env: "CHATMOCK_API_KEY"
  text_models:
    - "gpt-4o-mini"
    - "gpt-4.1-mini"
  vision_model: "gpt-4o-mini"
  temperature: 0.0
  max_tokens: 900
  timeout_seconds: 60
  normalizer_enabled: false
  normalizer_max_chars: 6000
